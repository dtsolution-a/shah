<!-- White-only Shah logo for dark backgrounds and dark mode -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" fill="none">
  <!-- Circle background (white outline ring, transparent center) -->
  <circle cx="64" cy="64" r="60" fill="white" fill-opacity="0.12"/>
  <circle cx="64" cy="64" r="60" stroke="white" stroke-opacity="0.4" stroke-width="2" fill="none"/>
  <!-- S mark -->
  <text x="64" y="83" font-family="'Arial Black',Arial,sans-serif" font-size="72" font-weight="900" text-anchor="middle" fill="white">S</text>
  <!-- Tagline -->
  <text x="64" y="122" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" text-anchor="middle" fill="white" opacity="0.7" letter-spacing="0.3">Adding wings to your vision</text>

  <!-- Vertical divider -->
  <line x1="138" y1="18" x2="138" y2="112" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Since 1995 -->
  <text x="152" y="28" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic" fill="white" fill-opacity="0.7" letter-spacing="0.4">Since 1995</text>

  <!-- SHAH wordmark -->
  <text x="150" y="84" font-family="'Arial Black',Arial,sans-serif" font-size="58" font-weight="900" fill="white" letter-spacing="3">SHAH</text>

  <!-- Engineers & Consultants Private Limited -->
  <text x="152" y="108" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" fill-opacity="0.75" letter-spacing="0.5">Engineers &amp; Consultants Private Limited</text>
</svg>
