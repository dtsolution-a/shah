# Nixpacks config — tells Railway exactly how to build this project

[phases.setup]
# Install system dependencies needed for better-sqlite3 native compilation
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake"]

[phases.install]
# Use npm install (not npm ci) to avoid lockfile strictness issues
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
# No frontend build needed on Railway (backend only)
cmds = []

[start]
cmd = "node server/index.js"
